# Configuration file for unbound-pkg

# Directory to save the built .deb packages (relative or absolute)
OUTPUT_DIR="output"

# Directory where configuration backups and rollbacks are saved
BACKUP_DIR="/var/backups/unbound-pkg"

# Log file for compilation and process output
LOG_FILE="build.log"

# Debian pool repository URL for Unbound dsc package lookup
DEBIAN_POOL_URL="https://deb.debian.org/debian/pool/main/u/unbound/"
